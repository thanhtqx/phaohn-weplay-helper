<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Đăng nhập — Pháo™</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/style.css?v=38" />
</head>
<body class="login-page phaohn-app">
  <div class="login-shell">
    <div class="login-card">
      <a href="/" class="brand brand-center">
        <span class="brand-mark brand-mark-phao brand-mark-lg" aria-hidden="true"><i class="bi bi-fire"></i></span>
        <span class="brand-text">
          <strong class="brand-name">Pháo<sup class="brand-tm">™</sup></strong>
          <small>Quản lý từ khóa Gián điệp</small>
        </span>
      </a>

      <form id="loginForm" class="login-form">
        <label class="field">
          Tài khoản
          <input id="username" name="username" autocomplete="username" required />
        </label>
        <label class="field">
          Mật khẩu
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <p id="loginError" class="alert alert-error hidden"></p>
        <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
      </form>

      <p class="login-hint">Tài khoản do Admin cấp.</p>
    </div>
    <p class="login-copy">© Pháo™</p>
  </div>
  <script src="/static/login.js"></script>
</body>
</html>
